server {
    listen 80;
    listen [::]:80;
    server_name training.jesselab.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name training.jesselab.space;

    ssl_certificate     /etc/letsencrypt/live/jesselab.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jesselab.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Shell assets — alias to apex's deployed shell directory.
    # /srv/web/home/site/shell/ is shipped by personal_web's deploy.
    location ^~ /shell/ {
        alias /srv/web/home/site/shell/;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        location ~* \.(woff2|ttf)$ {
            add_header Cache-Control "public, max-age=2592000, immutable" always;
            try_files $uri =404;
        }
        try_files $uri =404;
    }

    root /srv/web/training/site;
    index index.html;

    # SPA fallback — every unknown path resolves to index.html so the
    # client-side router can handle it. Real assets (.js/.css/.json/...)
    # 404 cleanly because try_files matches them as files first.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed asset URLs are immutable; everything else stays revalidated
    # so config and the SHA stamp don't go stale on phones.
    location ~* \.(js|css|png|jpg|jpeg|svg|webp|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300";
    }

    location = /version.txt {
        add_header Cache-Control "no-store";
    }

    location = /data/api_base.json {
        add_header Cache-Control "no-store";
    }

    # Service worker must never be cached — stale SW means stale app.
    location = /service-worker.js {
        add_header Cache-Control "no-store";
    }

    # Manifest changes rarely; revalidate often so home-screen install
    # picks up icon / theme tweaks.
    location = /manifest.json {
        add_header Cache-Control "public, max-age=300";
    }
}
